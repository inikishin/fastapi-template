[mypy]
python_version = 3.12
# Skip Alembic revisions and Claude Code skill assets — the latter are templates
# copied into the project on demand by the initial-setup skill and may reference
# optional dependencies (taskiq, keycloak, redis.asyncio) that are not installed
# until the corresponding subsystem is enabled.
exclude = (migrations|claude)/
ignore_missing_imports = True

[mypy-pytz.*]
ignore_missing_imports = True
