[pytest]
markers =
    smoke: subset of tests that should be run before each commit
    no_auth_mock: disable autouse HTTPBearer mock to exercise the real unauthenticated flow
addopts =
    --strict-markers --disable-warnings --cov=src --cov-report html
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session